<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Furina AI · CGP</title>
    <!-- Font Awesome 6 (Free) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: bold & modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: #e0e0e0;
        }

        /* --- neon cyan & biru tua gradient animasi --- */
        @keyframes neonPulse {
            0% {
                box-shadow: 0 0 2px #00ffff, 0 0 5px #00ffff, 0 0 8px #0a4d8c;
                border-color: #00ffff66;
            }
            50% {
                box-shadow: 0 0 10px #0af0ff, 0 0 20px #0af0ff, 0 0 12px #0044ff;
                border-color: #0af0ff;
            }
            100% {
                box-shadow: 0 0 2px #00ffff, 0 0 5px #00ffff, 0 0 8px #0a4d8c;
                border-color: #00ffff66;
            }
        }

        .neon-border {
            border: 1px solid #00ccff;
            animation: neonPulse 2.2s infinite ease-in-out;
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(2px);
        }

        /* Struktur utama mirip Gemini (99% gemini style: sidebar + chat utama bersih) */
        .app-container {
            display: flex;
            height: 100vh;
            width: 100%;
            background: #000;
        }

        /* SIDEBAR KONTENER PERCAKAPAN (gemini-like left rail) */
        .chat-sidebar {
            width: 280px;
            background: #0a0a0e;
            border-right: 1px solid #00ccff30;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px 16px 12px;
            border-bottom: 1px solid #0ff22a30;
        }

        .new-chat-btn {
            background: linear-gradient(135deg, #0a2b3a, #001133);
            border: 1px solid #0af0ff;
            color: cyan;
            font-weight: bold;
            padding: 10px 12px;
            border-radius: 40px;
            width: 100%;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .new-chat-btn:hover {
            background: #0a4b6e;
            box-shadow: 0 0 8px cyan;
            color: white;
        }

        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .session-item {
            background: #0f0f14;
            border-radius: 16px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.15s;
            border-left: 3px solid transparent;
        }

        .session-item.active {
            background: #101624;
            border-left: 3px solid #0af0ff;
            box-shadow: 0 0 6px cyan;
        }

        .session-name {
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: -0.2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            color: #ddd;
        }

        .session-actions {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .session-actions button {
            background: none;
            border: none;
            color: #5f9eff;
            cursor: pointer;
            font-size: 1rem;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.1s;
        }

        .session-actions button:hover {
            background: #1e2a3e;
            color: #0af0ff;
        }

        /* MAIN CHAT AREA */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
            position: relative;
        }

        /* header dengan foto & title */
        .chat-header {
            text-align: center;
            padding: 20px 20px 10px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #0af0ff30;
        }

        .photo-frame {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }

        .photo-rect {
            width: 140px;
            height: 80px;
            background: #0c0c12;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid cyan;
            animation: neonPulse 2s infinite;
            box-shadow: 0 0 12px #0af0ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-rect img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .title-neon {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00ffff, #0066ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 6px cyan;
            letter-spacing: 1px;
        }

        /* model info + api key mini bar */
        .model-badge {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 6px;
            font-size: 0.7rem;
            background: #0a0f1a80;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
        }

        .api-link {
            color: #5f9eff;
            text-decoration: none;
            font-weight: 500;
        }

        /* CHAT BUBBLE AREA */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            scroll-behavior: smooth;
        }

        .message-bubble {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            max-width: 85%;
            animation: fadeSlide 0.2s ease;
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }

        .message-bubble.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-content {
            background: #11141f;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #2a3e6e;
            word-wrap: break-word;
            font-size: 0.9rem;
            line-height: 1.45;
            position: relative;
            transition: 0.1s;
            box-shadow: 0 2px 6px rgba(0, 255, 255, 0.1);
        }

        .user .message-content {
            background: #0a2647;
            border: 1px solid #0af0ff;
        }

        .assistant .message-content {
            background: #0c1020;
            border-left: 3px solid #0af0ff;
        }

        .message-actions {
            display: flex;
            gap: 8px;
            margin-left: 8px;
            opacity: 0.5;
            transition: 0.1s;
        }

        .message-bubble:hover .message-actions {
            opacity: 1;
        }

        .message-actions button {
            background: #1a1f2e;
            border: none;
            color: #9acdff;
            border-radius: 30px;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        /* input area */
        .input-area {
            padding: 16px 24px 24px;
            background: #000000dd;
            border-top: 1px solid #0af0ff40;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            background: #0f121c;
            border: 1px solid #2e4a7a;
            border-radius: 36px;
            padding: 14px 20px;
            color: white;
            font-size: 0.9rem;
            resize: none;
            font-family: inherit;
            transition: 0.2s;
        }

        .chat-input:focus {
            outline: none;
            border-color: #0af0ff;
            box-shadow: 0 0 8px cyan;
        }

        .send-btn {
            background: radial-gradient(circle at 30% 10%, #0a3255, #001133);
            border: 1px solid cyan;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            color: cyan;
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 10px cyan;
        }

        /* api key panel kecil */
        .api-key-panel {
            background: #0b0e16;
            border-radius: 20px;
            margin: 8px 24px 0;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            gap: 12px;
            flex-wrap: wrap;
        }

        .api-key-input {
            background: #1a1f2c;
            border: 1px solid #2e4a7a;
            border-radius: 28px;
            padding: 6px 12px;
            color: white;
            flex: 2;
            font-size: 0.7rem;
        }

        /* scroll */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: #0af0ff;
            border-radius: 10px;
        }

        /* responsive */
        @media (max-width: 680px) {
            .chat-sidebar {
                width: 230px;
            }
            .message-bubble {
                max-width: 95%;
            }
            .title-neon {
                font-size: 1.4rem;
            }
        }
        .loading-dots i {
            font-size: 0.8rem;
            margin: 0 2px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- SIDEBAR: kontainer percakapan -->
    <div class="chat-sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="newChatBtn"><i class="fas fa-plus-circle"></i> Percakapan Baru</button>
        </div>
        <div class="sessions-list" id="sessionsList"></div>
        <div style="padding: 12px; font-size: 10px; text-align: center; color: #0af0ff80;">
            <i class="fas fa-comment-dots"></i> Furina CGP · Fast RP
        </div>
    </div>

    <!-- MAIN PANEL -->
    <div class="chat-main">
        <div class="chat-header">
            <div class="photo-frame">
                <div class="photo-rect">
                    <img src="F2.png" alt="Furina Portrait" onerror="this.onerror=null; this.src='https://placehold.co/400x200/0a0f1a/cyan?text=Furina+AI'; this.style.objectFit='cover';">
                </div>
            </div>
            <div class="title-neon">Furina CGP</div>
            <div class="model-badge">
                <span><i class="fas fa-microchip"></i> Furina Fast RP_3.1</span>
                <span><i class="fas fa-database"></i> Deepseek Core</span>
            </div>
        </div>

        <!-- API Key & link -->
        <div class="api-key-panel">
            <i class="fas fa-key" style="color:#0af0ff"></i>
            <input type="text" id="deepseekApiKey" class="api-key-input" placeholder="Masukkan Deepseek API Key" autocomplete="off">
            <a href="https://platform.deepseek.com/api_keys" target="_blank" class="api-link">Dapatkan Key <i class="fas fa-external-link-alt"></i></a>
        </div>

        <!-- CHAT BUBBLE CONTAINER -->
        <div class="messages-container" id="messagesContainer">
            <div style="text-align: center; color: #6c86a3; margin-top: 30px;">
                <i class="fas fa-feather-alt"></i> Mulai roleplay atau obrol dengan Furina~
            </div>
        </div>

        <!-- INPUT AREA -->
        <div class="input-area">
            <textarea class="chat-input" id="chatInput" rows="1" placeholder="Tulis pesanmu... (RolePlay, cerita, bebas)"></textarea>
            <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    // ---------- STORAGE & MODEL ----------
    let sessions = [];           // [{ id, name, messages: [{id, role, content}] }]
    let activeSessionId = null;
    let isLoading = false;      // untuk fast response disable kirim selama loading

    // Load from localStorage
    function loadSessions() {
        const stored = localStorage.getItem("furina_sessions");
        if (stored) {
            try {
                sessions = JSON.parse(stored);
                if (!sessions.length) throw new Error();
            } catch(e) { initDefaultSession(); }
        } else {
            initDefaultSession();
        }
        // validasi active session
        if (!activeSessionId || !sessions.find(s => s.id === activeSessionId)) {
            activeSessionId = sessions[0]?.id || null;
        }
        renderSidebar();
        renderCurrentChat();
    }

    function initDefaultSession() {
        const defaultMsg = [{
            id: Date.now() + 100,
            role: "assistant",
            content: "✨ Halo! Aku Furina, bintang panggungmu! Aku siap menemani petualangan, roleplay, atau ngobrol seru. 💧 Ceritakan apa pun (kecuali malware, virus, atau narkoba~)! Fast RP 3.1 aktif. Ada yang bisa aku bantu? 🌊"
        }];
        sessions = [{
            id: "s1_" + Date.now(),
            name: "Panggung Furina ✨",
            messages: defaultMsg
        }];
        activeSessionId = sessions[0].id;
        saveSessions();
    }

    function saveSessions() {
        localStorage.setItem("furina_sessions", JSON.stringify(sessions));
    }

    // Render daftar kontainer percakapan (sidebar) dengan tombol = (menu rename) dan x (hapus)
    function renderSidebar() {
        const container = document.getElementById("sessionsList");
        if (!container) return;
        container.innerHTML = "";
        sessions.forEach(session => {
            const div = document.createElement("div");
            div.className = `session-item ${activeSessionId === session.id ? 'active' : ''}`;
            div.setAttribute("data-id", session.id);
            const nameSpan = document.createElement("span");
            nameSpan.className = "session-name";
            nameSpan.innerText = session.name;
            nameSpan.title = "Klik untuk beralih";
            nameSpan.addEventListener("click", (e) => {
                e.stopPropagation();
                switchSession(session.id);
            });
            const actionDiv = document.createElement("div");
            actionDiv.className = "session-actions";
            // tombol "=" (menu rename)
            const menuBtn = document.createElement("button");
            menuBtn.innerHTML = '<i class="fas fa-equals"></i>';
            menuBtn.title = "Rename kontainer";
            menuBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                const newName = prompt("Ubah nama kontainer percakapan:", session.name);
                if (newName && newName.trim() !== "") {
                    session.name = newName.trim();
                    saveSessions();
                    renderSidebar();
                }
            });
            // tombol X -> hapus kontainer (keluar dari halaman kontainer)
            const delBtn = document.createElement("button");
            delBtn.innerHTML = '<i class="fas fa-times"></i>';
            delBtn.title = "Hapus kontainer (X)";
            delBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (sessions.length === 1) {
                    alert("Minimal satu kontainer percakapan diperlukan.");
                    return;
                }
                if (confirm(`Hapus kontainer "${session.name}"? Percakapan akan hilang.`)) {
                    const idx = sessions.findIndex(s => s.id === session.id);
                    if (idx !== -1) sessions.splice(idx, 1);
                    if (activeSessionId === session.id) {
                        activeSessionId = sessions[0].id;
                    }
                    saveSessions();
                    renderSidebar();
                    renderCurrentChat();
                }
            });
            actionDiv.appendChild(menuBtn);
            actionDiv.appendChild(delBtn);
            div.appendChild(nameSpan);
            div.appendChild(actionDiv);
            container.appendChild(div);
        });
    }

    function switchSession(sessionId) {
        if (activeSessionId === sessionId) return;
        activeSessionId = sessionId;
        renderSidebar();
        renderCurrentChat();
    }

    // render chat bubble dengan edit & delete
    function renderCurrentChat() {
        const container = document.getElementById("messagesContainer");
        if (!container) return;
        const session = sessions.find(s => s.id === activeSessionId);
        if (!session) return;
        if (session.messages.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#6c86a3;"><i class="fas fa-comment"></i> Mulai percakapan dengan Furina</div>';
            return;
        }
        container.innerHTML = "";
        session.messages.forEach(msg => {
            const bubbleDiv = document.createElement("div");
            bubbleDiv.className = `message-bubble ${msg.role}`;
            // content wrapper
            const contentDiv = document.createElement("div");
            contentDiv.className = "message-content";
            contentDiv.innerHTML = markedText(msg.content);
            // actions
            const actionsDiv = document.createElement("div");
            actionsDiv.className = "message-actions";
            // edit button
            const editBtn = document.createElement("button");
            editBtn.innerHTML = '<i class="fas fa-pen"></i>';
            editBtn.title = "Edit pesan";
            editBtn.addEventListener("click", () => {
                const newContent = prompt("Edit pesan:", msg.content);
                if (newContent !== null && newContent.trim() !== "") {
                    msg.content = newContent.trim();
                    saveSessions();
                    renderCurrentChat();
                }
            });
            const delBtn = document.createElement("button");
            delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
            delBtn.title = "Hapus pesan";
            delBtn.addEventListener("click", () => {
                if (confirm("Hapus pesan ini?")) {
                    const idx = session.messages.findIndex(m => m.id === msg.id);
